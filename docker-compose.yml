version: '3.9'

services:
  # ---------------------------------------------------------------
  # PHP-FPM application server
  # ---------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vcp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vendor_compliance}
      DB_USERNAME: ${DB_USERNAME:-vcpuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      MAIL_MAILER: log
      FILESYSTEM_DISK: vendor_documents
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vcp_network

  # ---------------------------------------------------------------
  # Nginx web server
  # ---------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: vcp_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - vcp_network

  # ---------------------------------------------------------------
  # MySQL 8 database
  # ---------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: vcp_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vendor_compliance}
      MYSQL_USER: ${DB_USERNAME:-vcpuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_EXPOSE_PORT:-33060}:3306"
    volumes:
      - vcp_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vcp_network

  # ---------------------------------------------------------------
  # Artisan scheduler (runs every minute via supercronic)
  # ---------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vcp_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vendor_compliance}
      DB_USERNAME: ${DB_USERNAME:-vcpuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vcp_network

networks:
  vcp_network:
    driver: bridge

volumes:
  vcp_db_data:
    driver: local
