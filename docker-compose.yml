services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    environment: &app-environment
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY}
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vendor_compliance}
      DB_USERNAME: ${DB_USERNAME:-vcpuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      MAIL_MAILER: log
      FILESYSTEM_DISK: local
      VENDOR_DOCUMENTS_DISK_DRIVER: local
    volumes:
      - vendor_documents:/var/www/html/storage/app/private/vendor-documents
      - app_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks: [vendor_network]

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on: [app]
    networks: [vendor_network]

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-vendor_compliance}
      MYSQL_USER: ${DB_USERNAME:-vcpuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_EXPOSE_PORT:-33060}:3306"
    volumes:
      - vendor_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [vendor_network]

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    environment: *app-environment
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - vendor_documents:/var/www/html/storage/app/private/vendor-documents
      - app_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks: [vendor_network]

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    environment: *app-environment
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - vendor_documents:/var/www/html/storage/app/private/vendor-documents
      - app_logs:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy
    networks: [vendor_network]

networks:
  vendor_network:

volumes:
  vendor_db:
  vendor_documents:
  app_logs:
