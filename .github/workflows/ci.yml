name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, gd, zip, xml, simplexml, xmlreader, xmlwriter, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:latest

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Prepare application environment
        run: |
          cp .env.sqlite.example .env
          mkdir -p bootstrap/cache
          mkdir -p storage/app/private
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p database
          touch database/database.sqlite
          chmod -R 775 bootstrap/cache storage
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE='"$(pwd)"'/database/database.sqlite|' .env
          php -r '$path=".env"; $text=file_get_contents($path); $key="base64:".base64_encode(random_bytes(32)); $text=preg_replace("/^APP_KEY=.*/m", "APP_KEY=".$key, $text); file_put_contents($path, $text);'

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Resolve and install PHP dependencies
        run: composer update --no-interaction --prefer-dist --no-progress --with-all-dependencies

      - name: Audit PHP dependencies
        run: composer audit

      - name: Install frontend dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-fund

      - name: Clear Laravel caches
        run: php artisan optimize:clear

      - name: PHP syntax check
        run: find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run Laravel tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      - name: Build frontend assets
        run: npm run build

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
